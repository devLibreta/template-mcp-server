services:
  template-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: template-mcp-server
    ports:
      - "${MCP_PORT:-3000}:3000"
      - "6274:6274"
      - "6277:6277"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm-store:/workspace/.pnpm-store
      - /Users/server/.gitconfig:/home/node/.gitconfig:ro
      - /Users/server/.ssh:/home/node/.ssh:ro
    user: node
    environment:
      - HOST=0.0.0.0
      - PROXY_HOST=0.0.0.0
    tty: true

volumes:
  node_modules:
  pnpm-store:
